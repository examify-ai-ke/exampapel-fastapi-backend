version: '3.8'

services:
  # PostgreSQL Database
  examify_database:
    image: docker.io/bitnami/postgresql:latest
    container_name: examify_database_prod
    restart: always
    environment:
      # We map Dokploy's UI variables into what the Bitnami image explicitly expects
      - POSTGRESQL_USERNAME=${DATABASE_USER}
      - POSTGRESQL_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRESQL_DATABASE=${DATABASE_NAME}
      - POSTGRESQL_MULTIPLE_DATABASES=${DATABASE_CELERY_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create-dbs.sql:/docker-entrypoint-initdb.d/01-create-dbs.sql:ro
    healthcheck:
      # Healthcheck using the explicit username and db from Dokploy
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  examify_redis:
    image: redis:7-alpine
    container_name: examify_redis_prod
    restart: always
    # Dokploy env variables are expanded here (passing through to shell)
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  examify_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examify_backend_prod
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - 8000
    env_file:
      - .env
    environment:
      - MODE=production
      - DATABASE_HOST=examify_database
      - DATABASE_PORT=5432
      - REDIS_HOST=examify_redis
      - REDIS_PORT=6379
    depends_on:
      examify_database:
        condition: service_healthy
      examify_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  examify_celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examify_celery_worker_prod
    restart: always
    command: celery -A app.core.celery worker -l info --concurrency=2
    env_file:
      - .env
    environment:
      - MODE=production
      - DATABASE_HOST=examify_database
      - DATABASE_PORT=5432
      - REDIS_HOST=examify_redis
      - REDIS_PORT=6379
    depends_on:
      examify_database:
        condition: service_healthy
      examify_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Beat - Scheduled Tasks
  examify_celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examify_celery_beat_prod
    restart: always
    command: celery -A app.core.celery beat -l info -S celery_sqlalchemy_scheduler.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - MODE=production
      - DATABASE_HOST=examify_database
      - DATABASE_PORT=5432
      - REDIS_HOST=examify_redis
      - REDIS_PORT=6379
    depends_on:
      examify_database:
        condition: service_healthy
      examify_redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
