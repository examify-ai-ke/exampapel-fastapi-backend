name: 🚀 Simple CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: examify-api

jobs:
  # ============================================================================
  # BASIC QUALITY CHECKS
  # ============================================================================
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Cache dependencies
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install dependencies
        working-directory: ./backend/app
        run: poetry install --with dev

      - name: 🎨 Format check
        working-directory: ./backend/app
        run: poetry run black --check .

      - name: 🔍 Lint
        working-directory: ./backend/app
        run: poetry run ruff check .

      - name: 🏷️ Type check
        working-directory: ./backend/app
        run: poetry run mypy . || true  # Don't fail on type errors for now

  # ============================================================================
  # BASIC TESTS
  # ============================================================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1

      - name: 📚 Install dependencies
        working-directory: ./backend/app
        run: poetry install --with dev

      - name: 🔧 Setup test environment
        run: |
          cat > .env << EOF
          PROJECT_NAME=Examify API Test
          MODE=testing
          API_VERSION=v1
          DATABASE_USER=testuser
          DATABASE_PASSWORD=testpass
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_NAME=testdb
          DATABASE_CELERY_NAME=testdb
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_MINUTES=1440
          OPENAI_API_KEY=test-key-for-testing
          MINIO_ROOT_USER=testuser
          MINIO_ROOT_PASSWORD=testpass
          S3_BUCKET_NAME=test-bucket
          MINIO_URL=localhost:9000
          FIRST_SUPERUSER_EMAIL=admin@test.com
          FIRST_SUPERUSER_PASSWORD=testpass
          EXT_ENDPOINT1=localhost
          LOCAL_1=localhost
          LOCAL_2=localhost
          EOF

      - name: 🧪 Run tests
        working-directory: ./backend/app
        env:
          # Set environment variables directly for the test run
          PROJECT_NAME: "Examify API Test"
          MODE: "testing"
          API_VERSION: "v1"
          DATABASE_USER: "testuser"
          DATABASE_PASSWORD: "testpass"
          DATABASE_HOST: "localhost"
          DATABASE_PORT: "5432"
          DATABASE_NAME: "testdb"
          DATABASE_CELERY_NAME: "testdb"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          REFRESH_TOKEN_EXPIRE_MINUTES: "1440"
          OPENAI_API_KEY: "test-key-for-testing"
          MINIO_ROOT_USER: "testuser"
          MINIO_ROOT_PASSWORD: "testpass"
          S3_BUCKET_NAME: "test-bucket"
          MINIO_URL: "localhost:9000"
          FIRST_SUPERUSER_EMAIL: "admin@test.com"
          FIRST_SUPERUSER_PASSWORD: "testpass"
        run: |
          # Run tests with verbose output and stop on first failure for faster feedback
          poetry run pytest -v --tb=short -x

  # ============================================================================
  # BUILD DOCKER IMAGE
  # ============================================================================
  build:
    name: 🐳 Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOY (Optional - only if you have AWS configured)
  # ============================================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && false  # Disabled by default - change to true when ready
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🚀 Deploy to AWS
        run: |
          echo "🚀 Deploying Examify API to AWS..."
          # Add your deployment commands here
          # For example: aws ecs update-service --cluster examify-cluster --service examify-api --force-new-deployment

  # ============================================================================
  # NOTIFICATION
  # ============================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [quality, test, build]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📊 Summary
        run: |
          echo "## 🎯 Examify API Build Summary"
          echo "- Quality: ${{ needs.quality.result }}"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Build: ${{ needs.build.result }}"
          
          if [[ "${{ needs.quality.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All checks passed! Examify API is ready! 🎉"
          else
            echo "❌ Some checks failed. Please review the logs."
          fi
