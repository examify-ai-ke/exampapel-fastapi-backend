name: 🚀 Examify API - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

# Add comprehensive permissions to avoid integration issues
permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  checks: write
  pull-requests: write
  statuses: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.6.1"

jobs:
  # ============================================================================
  # CODE QUALITY & SECURITY CHECKS
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.setup-python.outputs.python-version }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: 🐍 Set up Python
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        working-directory: ./backend/app
        run: poetry install --no-interaction --no-root --with dev

      - name: 🎨 Code Formatting Check (Black)
        working-directory: ./backend/app
        run: poetry run black --check --diff .

      - name: 🔍 Linting (Ruff)
        working-directory: ./backend/app
        run: poetry run ruff check .

      - name: 🏷️ Type Checking (MyPy)
        working-directory: ./backend/app
        run: poetry run mypy .

      - name: 🔒 Security Scan (Bandit)
        working-directory: ./backend/app
        run: |
          poetry add --group dev bandit[toml]
          poetry run bandit -r . -f json -o bandit-report.json || true
          poetry run bandit -r . || true

      - name: 📊 Upload Security Scan Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-scan-results
          path: backend/app/bandit-report.json

  # ============================================================================
  # DEPENDENCY VULNERABILITY SCANNING
  # ============================================================================
  dependency-scan:
    name: 🛡️ Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend/app'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # TESTING SUITE
  # ============================================================================
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.code-quality.outputs.python-version }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Load cached venv
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ needs.code-quality.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install Dependencies
        working-directory: ./backend/app
        run: poetry install --no-interaction --no-root --with dev

      - name: 🔧 Create Test Environment File
        run: |
          cat > .env.test << EOF
          PROJECT_NAME=Examify API Test
          MODE=testing
          API_VERSION=v1
          DATABASE_USER=testuser
          DATABASE_PASSWORD=testpassword
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_NAME=testdb
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_MINUTES=1440
          OPENAI_API_KEY=test-key
          MINIO_ROOT_USER=testuser
          MINIO_ROOT_PASSWORD=testpassword
          S3_BUCKET_NAME=test-bucket
          MINIO_URL=localhost:9000
          EOF

      - name: 🧪 Run Tests with Coverage
        working-directory: ./backend/app
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
        run: |
          poetry add --group dev pytest-cov pytest-xdist
          poetry run pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v --tb=short

      - name: 📊 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/app/coverage.xml
          flags: unittests
          name: examify-api-coverage
          fail_ci_if_error: false

      - name: 📈 Upload Coverage Reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: |
            backend/app/coverage.xml
            backend/app/htmlcov/

  # ============================================================================
  # DOCKER BUILD & SECURITY SCAN
  # ============================================================================
  docker-build:
    name: 🐳 Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    if: github.event_name != 'pull_request'
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔑 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Images
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV=false

      - name: 🔍 Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Start Services with Docker Compose
        run: |
          # Create test environment
          cp .env.example .env.test
          sed -i 's/ExamPapel-Project/Examify API Test/g' .env.test
          
          # Override image in docker-compose for testing
          export FASTAPI_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker compose -f docker-compose-test.yml --env-file .env.test up -d
          
          # Wait for services to be ready
          sleep 30
          
          # Health check
          docker compose -f docker-compose-test.yml ps
          docker compose -f docker-compose-test.yml logs fastapi_server

      - name: 🧪 Run Integration Tests
        run: |
          # Test API endpoints
          curl -f http://localhost/ || exit 1
          curl -f http://localhost/api/v1/openapi.json || exit 1
          
          # Test database connectivity
          docker compose -f docker-compose-test.yml exec -T fastapi_server python -c "
          import asyncio
          from app.core.database import get_async_session
          async def test_db():
              async for session in get_async_session():
                  result = await session.execute('SELECT 1')
                  print('Database connection successful')
                  break
          asyncio.run(test_db())
          "

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-test.yml down -v
          docker system prune -f

  # ============================================================================
  # DEPLOYMENT TO STAGING
  # ============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, integration-test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Tag and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: examify-api-staging
        run: |
          # Pull from GitHub Container Registry
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Tag for ECR
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          
          # Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: 🚀 Deploy to ECS Staging
        run: |
          # Update ECS service with new image
          aws ecs update-service \
            --cluster examify-staging \
            --service examify-api-staging \
            --force-new-deployment

      - name: ⏳ Wait for Deployment
        run: |
          aws ecs wait services-stable \
            --cluster examify-staging \
            --services examify-api-staging

  # ============================================================================
  # DEPLOYMENT TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, integration-test]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    environment: production
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Tag and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: examify-api-production
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          
          # Pull from GitHub Container Registry
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Tag for ECR
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          
          # Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: 🚀 Deploy to ECS Production
        run: |
          # Update ECS service with new image
          aws ecs update-service \
            --cluster examify-production \
            --service examify-api-production \
            --force-new-deployment

      - name: ⏳ Wait for Deployment
        run: |
          aws ecs wait services-stable \
            --cluster examify-production \
            --services examify-api-production

      - name: 🎉 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Examify API ${{ github.ref }}
          body: |
            ## 🚀 Examify API Release ${{ github.ref }}
            
            ### 📋 Changes
            - Automated release from CI/CD pipeline
            - Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}`
            
            ### 🔗 Links
            - [Docker Image](${{ env.REGISTRY }}/${{ env.IMAGE_NAME }})
            - [API Documentation](https://api.examify.com/api/v1/docs)
            
            ### ✅ Quality Gates Passed
            - ✅ Code quality checks
            - ✅ Security scans
            - ✅ Unit tests
            - ✅ Integration tests
          draft: false
          prerelease: false

  # ============================================================================
  # NOTIFICATION & CLEANUP
  # ============================================================================
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: 📧 Notify on Success
        if: ${{ needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success' }}
        run: |
          echo "🎉 Deployment successful!"
          # Add Slack/Discord/Email notifications here

      - name: 🚨 Notify on Failure
        if: ${{ needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure' }}
        run: |
          echo "❌ Deployment failed!"
          # Add failure notifications here
