name: 🔍 Pull Request Validation

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

# Add necessary permissions for PR validation
permissions:
  contents: read
  pull-requests: read
  statuses: write
  checks: write

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.6.1"

jobs:
  # ============================================================================
  # PR METADATA & VALIDATION
  # ============================================================================
  pr-validation:
    name: 📋 PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    # Add specific permissions for this job
    permissions:
      contents: read
      pull-requests: read
      statuses: write
      checks: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Validate PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.

      - name: 📊 PR Size Check
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;
            
            console.log(`PR Size: +${additions} -${deletions} (${changes} total changes)`);
            
            if (changes > 1000) {
              core.setFailed(`PR is too large (${changes} changes). Consider breaking it into smaller PRs.`);
            } else if (changes > 500) {
              core.warning(`PR is quite large (${changes} changes). Consider reviewing if it can be split.`);
            }

  # ============================================================================
  # FAST QUALITY CHECKS
  # ============================================================================
  quick-checks:
    name: ⚡ Quick Quality Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        working-directory: ./backend/app
        run: poetry install --no-interaction --no-root --with dev

      - name: 🎨 Check Code Formatting
        working-directory: ./backend/app
        run: |
          echo "::group::Black Formatting Check"
          poetry run black --check --diff . || {
            echo "::error::Code is not properly formatted. Run 'black .' to fix."
            exit 1
          }
          echo "::endgroup::"

      - name: 🔍 Lint Code
        working-directory: ./backend/app
        run: |
          echo "::group::Ruff Linting"
          poetry run ruff check . --output-format=github
          echo "::endgroup::"

      - name: 🏷️ Type Check
        working-directory: ./backend/app
        run: |
          echo "::group::MyPy Type Checking"
          poetry run mypy . || {
            echo "::error::Type checking failed. Please fix type issues."
            exit 1
          }
          echo "::endgroup::"

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend/app'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 🛡️ Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
          generateSarif: "1"

      - name: 📊 Upload Semgrep results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Load cached venv
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install Dependencies
        working-directory: ./backend/app
        run: poetry install --no-interaction --no-root --with dev

      - name: 🔧 Create Test Environment
        run: |
          cat > .env.test << EOF
          PROJECT_NAME=Examify API Test
          MODE=testing
          API_VERSION=v1
          DATABASE_USER=testuser
          DATABASE_PASSWORD=testpassword
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_NAME=testdb
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_MINUTES=1440
          OPENAI_API_KEY=test-key
          MINIO_ROOT_USER=testuser
          MINIO_ROOT_PASSWORD=testpassword
          S3_BUCKET_NAME=test-bucket
          MINIO_URL=localhost:9000
          EOF

      - name: 🧪 Run Tests with Coverage
        working-directory: ./backend/app
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
        run: |
          poetry add --group dev pytest-cov pytest-xdist
          poetry run pytest --cov=app --cov-report=xml --cov-report=term-missing -v --tb=short --maxfail=5

      - name: 📊 Coverage Comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_FILE: backend/app/coverage.xml
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

  # ============================================================================
  # DOCKER BUILD TEST
  # ============================================================================
  docker-build-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: examify-api:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV=false

      - name: 🔍 Test Docker Image
        run: |
          # Test that the image can start
          docker run --rm -d --name test-container \
            -e DATABASE_HOST=localhost \
            -e DATABASE_USER=test \
            -e DATABASE_PASSWORD=test \
            -e DATABASE_NAME=test \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -p 8000:8000 \
            examify-api:pr-${{ github.event.number }}
          
          # Wait for container to start
          sleep 10
          
          # Check if container is running
          docker ps | grep test-container
          
          # Cleanup
          docker stop test-container

  # ============================================================================
  # PR SUMMARY
  # ============================================================================
  pr-summary:
    name: 📝 PR Summary
    runs-on: ubuntu-latest
    needs: [pr-validation, quick-checks, security-scan, unit-tests, docker-build-test]
    if: always() && github.event.pull_request.draft == false
    
    steps:
      - name: 📊 Generate PR Summary
        uses: actions/github-script@v6
        with:
          script: |
            const results = {
              'PR Validation': '${{ needs.pr-validation.result }}',
              'Quick Checks': '${{ needs.quick-checks.result }}',
              'Security Scan': '${{ needs.security-scan.result }}',
              'Unit Tests': '${{ needs.unit-tests.result }}',
              'Docker Build': '${{ needs.docker-build-test.result }}'
            };
            
            let summary = '## 🔍 PR Validation Summary\n\n';
            let allPassed = true;
            
            for (const [check, result] of Object.entries(results)) {
              const emoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⏸️';
              summary += `${emoji} **${check}**: ${result}\n`;
              if (result !== 'success') allPassed = false;
            }
            
            if (allPassed) {
              summary += '\n🎉 **All checks passed!** This PR is ready for review.';
            } else {
              summary += '\n⚠️ **Some checks failed.** Please review and fix the issues above.';
            }
            
            // Add summary as PR comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ============================================================================
  # AUTO-MERGE FOR DEPENDABOT
  # ============================================================================
  dependabot-auto-merge:
    name: 🤖 Dependabot Auto-merge
    runs-on: ubuntu-latest
    needs: [pr-validation, quick-checks, security-scan, unit-tests, docker-build-test]
    if: |
      github.actor == 'dependabot[bot]' &&
      needs.pr-validation.result == 'success' &&
      needs.quick-checks.result == 'success' &&
      needs.security-scan.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      needs.docker-build-test.result == 'success'
    
    steps:
      - name: 🔀 Auto-merge Dependabot PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
