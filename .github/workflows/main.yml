# Read more about setting it up
# https://medium.com/@ljmocic/deploying-react-application-to-aws-s3-using-github-actions-85addacaeace

name: exam_papel_api
on:
  # Trigger the workflow on push or pull request,
  # but only for the master branch

  push:
    branches: [ main ]
    tags:
      - 'v*'
  #pull_request:
  #  branches: [ main ]

jobs:
  push_to_registry:
    name: Push Docker images to AWS ECR
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and push images using Docker Compose
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_API: exam-papel-api
          ECR_REPOSITORY_REDIS: exam-papel-redis
          ECR_REPOSITORY_CELERY_WORKER: exam-papel-celery-worker
          ECR_REPOSITORY_CELERY_BEAT: exam-papel-celery-beat
          ECR_REPOSITORY_MINIO: exam-papel-minio
          ECR_REPOSITORY_CADDY: exam-papel-caddy
          IMAGE_TAG: latest
        run: |
          # Build images using Docker Compose
          docker compose build

          # Tag images for ECR
          docker tag exam-papel-api:latest $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG
          docker tag redis:alpine $ECR_REGISTRY/$ECR_REPOSITORY_REDIS:$IMAGE_TAG
          docker tag exam-papel-celery-worker:latest $ECR_REGISTRY/$ECR_REPOSITORY_CELERY_WORKER:$IMAGE_TAG
          docker tag exam-papel-celery-beat:latest $ECR_REGISTRY/$ECR_REPOSITORY_CELERY_BEAT:$IMAGE_TAG
          docker tag minio/minio:latest $ECR_REGISTRY/$ECR_REPOSITORY_MINIO:$IMAGE_TAG
          docker tag caddy:alpine $ECR_REGISTRY/$ECR_REPOSITORY_CADDY:$IMAGE_TAG

          # Push images to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_REDIS:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CELERY_WORKER:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CELERY_BEAT:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_MINIO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CADDY:$IMAGE_TAG

  build:
    name: Build phase
    runs-on: ubuntu-latest
    needs: push_to_registry
    steps:
      - name: Clone repository
        id: clone-repository
        uses: actions/checkout@main
      - name: Generate deployment package
        id: generate-deployment-package
        run: zip -r deploy.zip . -x '*.git*'      
      - name: Deploy to EB
        id: deploy2b
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.AWS_APPLICATION_NAME }}
          environment_name: ${{ secrets.AWS_ENVIRONMENT_NAME }}
          version_label: v0.1.${{ github.run_number }}
          # use_existing_version_if_available: True
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip

