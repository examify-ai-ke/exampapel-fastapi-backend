name: ⚡ Performance Monitoring & Load Testing

on:
  schedule:
    # Run performance tests weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment for testing'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      test_duration:
        description: 'Test duration in minutes'
        required: true
        default: '5'
        type: string
      concurrent_users:
        description: 'Number of concurrent users'
        required: true
        default: '50'
        type: string

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ============================================================================
  # API PERFORMANCE TESTING
  # ============================================================================
  api-performance:
    name: 🚀 API Performance Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Performance Testing Tools
        run: |
          pip install locust pytest-benchmark httpx asyncio

      - name: 📝 Create Locust Performance Test
        run: |
          mkdir -p performance-tests
          cat > performance-tests/locustfile.py << 'EOF'
          from locust import HttpUser, task, between
          import json
          import random

          class ExamifyAPIUser(HttpUser):
              wait_time = between(1, 3)
              
              def on_start(self):
                  """Login and get authentication token"""
                  response = self.client.post("/api/v1/login", json={
                      "email": "user@example.com",
                      "password": "admin",
                      "provider": "email"
                  })
                  if response.status_code == 200:
                      self.token = response.json().get("data", {}).get("access_token")
                      self.headers = {"Authorization": f"Bearer {self.token}"}
                  else:
                      self.headers = {}

              @task(3)
              def get_root(self):
                  """Test root endpoint"""
                  self.client.get("/")

              @task(2)
              def get_openapi(self):
                  """Test OpenAPI schema endpoint"""
                  self.client.get("/api/v1/openapi.json")

              @task(5)
              def get_user_profile(self):
                  """Test user profile endpoint"""
                  if hasattr(self, 'headers'):
                      self.client.get("/api/v1/user/me", headers=self.headers)

              @task(4)
              def get_exam_papers(self):
                  """Test exam papers listing"""
                  if hasattr(self, 'headers'):
                      self.client.get("/api/v1/exampaper", headers=self.headers)

              @task(2)
              def get_institutions(self):
                  """Test institutions listing"""
                  if hasattr(self, 'headers'):
                      self.client.get("/api/v1/institution", headers=self.headers)

              @task(1)
              def search_papers(self):
                  """Test search functionality"""
                  if hasattr(self, 'headers'):
                      search_terms = ["math", "science", "history", "english"]
                      term = random.choice(search_terms)
                      self.client.get(f"/api/v1/exampaper?search={term}", headers=self.headers)
          EOF

      - name: 🏃 Run Load Test
        env:
          TARGET_HOST: ${{ github.event.inputs.target_environment == 'production' && 'https://api.examify.com' || 'https://staging-api.examify.com' }}
          USERS: ${{ github.event.inputs.concurrent_users || '50' }}
          DURATION: ${{ github.event.inputs.test_duration || '5' }}
        run: |
          cd performance-tests
          locust -f locustfile.py \
            --host=$TARGET_HOST \
            --users=$USERS \
            --spawn-rate=10 \
            --run-time=${DURATION}m \
            --html=performance-report.html \
            --csv=performance-results \
            --headless

      - name: 📊 Upload Performance Results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: |
            performance-tests/performance-report.html
            performance-tests/performance-results_*.csv

  # ============================================================================
  # DATABASE PERFORMANCE
  # ============================================================================
  database-performance:
    name: 🗄️ Database Performance Testing
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1

      - name: 📚 Install Dependencies
        working-directory: ./backend/app
        run: |
          poetry install --no-interaction --no-root --with dev
          poetry add --group dev pytest-benchmark

      - name: 📝 Create Database Performance Tests
        run: |
          mkdir -p performance-tests/db
          cat > performance-tests/db/test_db_performance.py << 'EOF'
          import pytest
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
          from sqlalchemy.orm import sessionmaker
          from sqlalchemy import text
          import time

          DATABASE_URL = "postgresql+asyncpg://testuser:testpassword@localhost:5432/testdb"

          @pytest.fixture
          async def db_session():
              engine = create_async_engine(DATABASE_URL)
              async_session = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
              async with async_session() as session:
                  yield session
              await engine.dispose()

          @pytest.mark.asyncio
          async def test_simple_query_performance(benchmark, db_session):
              """Test simple SELECT query performance"""
              async def run_query():
                  result = await db_session.execute(text("SELECT 1"))
                  return result.scalar()
              
              result = await benchmark.pedantic(run_query, rounds=100, iterations=1)
              assert result == 1

          @pytest.mark.asyncio
          async def test_complex_query_performance(benchmark, db_session):
              """Test complex query performance"""
              async def run_complex_query():
                  query = text("""
                      SELECT COUNT(*) as total,
                             AVG(EXTRACT(EPOCH FROM NOW() - created_at)) as avg_age
                      FROM (SELECT NOW() as created_at FROM generate_series(1, 1000)) as dummy_data
                  """)
                  result = await db_session.execute(query)
                  return result.fetchone()
              
              result = await benchmark.pedantic(run_complex_query, rounds=10, iterations=1)
              assert result is not None

          @pytest.mark.asyncio
          async def test_concurrent_connections(db_session):
              """Test concurrent database connections"""
              async def single_query():
                  result = await db_session.execute(text("SELECT pg_sleep(0.1), 1"))
                  return result.scalar()
              
              start_time = time.time()
              tasks = [single_query() for _ in range(10)]
              results = await asyncio.gather(*tasks)
              end_time = time.time()
              
              # Should complete in roughly 0.1 seconds due to concurrency
              assert end_time - start_time < 1.0
              assert all(r == 1 for r in results)
          EOF

      - name: 🧪 Run Database Performance Tests
        working-directory: ./backend/app
        run: |
          poetry run pytest ../../../performance-tests/db/ \
            --benchmark-json=db-performance.json \
            --benchmark-html=db-performance.html \
            -v

      - name: 📊 Upload Database Performance Results
        uses: actions/upload-artifact@v3
        with:
          name: db-performance-results
          path: |
            backend/app/db-performance.json
            backend/app/db-performance.html

  # ============================================================================
  # MEMORY & CPU PROFILING
  # ============================================================================
  profiling:
    name: 🔬 Memory & CPU Profiling
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Profiling Tools
        run: |
          pip install memory-profiler py-spy psutil

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image with Profiling
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: examify-api:profiling
          build-args: |
            INSTALL_DEV=true

      - name: 🚀 Start Application for Profiling
        run: |
          # Start the application
          docker run -d --name profiling-container \
            -p 8000:8000 \
            -e DATABASE_HOST=localhost \
            -e DATABASE_USER=test \
            -e DATABASE_PASSWORD=test \
            -e DATABASE_NAME=test \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            examify-api:profiling
          
          # Wait for startup
          sleep 30

      - name: 🔬 CPU Profiling
        run: |
          # Get container PID
          CONTAINER_PID=$(docker inspect -f '{{.State.Pid}}' profiling-container)
          
          # Profile for 60 seconds
          sudo py-spy record -o cpu-profile.svg -d 60 -p $CONTAINER_PID || true

      - name: 🧠 Memory Profiling
        run: |
          # Create memory profiling script
          cat > memory_profile.py << 'EOF'
          import requests
          import time
          from memory_profiler import profile
          
          @profile
          def load_test():
              for i in range(100):
                  try:
                      response = requests.get('http://localhost:8000/')
                      response = requests.get('http://localhost:8000/api/v1/openapi.json')
                  except:
                      pass
                  time.sleep(0.1)
          
          if __name__ == '__main__':
              load_test()
          EOF
          
          python memory_profile.py > memory-profile.txt 2>&1 || true

      - name: 📊 Container Resource Usage
        run: |
          # Get container stats
          docker stats --no-stream profiling-container > container-stats.txt
          
          # Get detailed container info
          docker inspect profiling-container > container-inspect.json

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker stop profiling-container || true
          docker rm profiling-container || true

      - name: 📊 Upload Profiling Results
        uses: actions/upload-artifact@v3
        with:
          name: profiling-results
          path: |
            cpu-profile.svg
            memory-profile.txt
            container-stats.txt
            container-inspect.json

  # ============================================================================
  # LIGHTHOUSE PERFORMANCE (if you have a frontend)
  # ============================================================================
  lighthouse-audit:
    name: 🏠 Frontend Performance Audit
    runs-on: ubuntu-latest
    if: false  # Enable this if you have a frontend
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🌐 Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://examify.com
            https://examify.com/docs
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ============================================================================
  # PERFORMANCE REGRESSION DETECTION
  # ============================================================================
  regression-detection:
    name: 📈 Performance Regression Detection
    runs-on: ubuntu-latest
    needs: [api-performance, database-performance]
    
    steps:
      - name: 📥 Download Performance Results
        uses: actions/download-artifact@v3
        with:
          name: performance-results

      - name: 📊 Analyze Performance Trends
        run: |
          # Create performance analysis script
          cat > analyze_performance.py << 'EOF'
          import json
          import csv
          import sys
          from datetime import datetime

          def analyze_performance():
              try:
                  # Read Locust results
                  with open('performance-results_stats.csv', 'r') as f:
                      reader = csv.DictReader(f)
                      stats = list(reader)
                  
                  # Analyze key metrics
                  for stat in stats:
                      if stat['Name'] == 'Aggregated':
                          avg_response_time = float(stat['Average Response Time'])
                          failure_rate = float(stat['Failure Count']) / (float(stat['Request Count']) + float(stat['Failure Count'])) * 100
                          
                          print(f"Average Response Time: {avg_response_time:.2f}ms")
                          print(f"Failure Rate: {failure_rate:.2f}%")
                          
                          # Performance thresholds
                          if avg_response_time > 1000:  # 1 second
                              print("⚠️ WARNING: Average response time exceeds 1 second")
                              sys.exit(1)
                          
                          if failure_rate > 1:  # 1% failure rate
                              print("⚠️ WARNING: Failure rate exceeds 1%")
                              sys.exit(1)
                          
                          print("✅ Performance metrics within acceptable limits")
                          
              except Exception as e:
                  print(f"Error analyzing performance: {e}")
                  sys.exit(1)

          if __name__ == '__main__':
              analyze_performance()
          EOF
          
          python analyze_performance.py

      - name: 📝 Generate Performance Report
        run: |
          cat > performance-summary.md << 'EOF'
          # 📊 Performance Test Summary
          
          **Test Date:** $(date)
          **Environment:** ${{ github.event.inputs.target_environment || 'staging' }}
          **Duration:** ${{ github.event.inputs.test_duration || '5' }} minutes
          **Concurrent Users:** ${{ github.event.inputs.concurrent_users || '50' }}
          
          ## 🎯 Key Metrics
          
          - **Average Response Time:** See detailed results
          - **95th Percentile:** See detailed results  
          - **Failure Rate:** See detailed results
          - **Requests per Second:** See detailed results
          
          ## 📈 Trends
          
          Performance trends will be tracked over time to identify regressions.
          
          ## 🔍 Recommendations
          
          Based on the performance test results, consider:
          - Database query optimization
          - Caching improvements
          - Resource scaling
          
          EOF

      - name: 📊 Upload Performance Summary
        uses: actions/upload-artifact@v3
        with:
          name: performance-summary
          path: performance-summary.md

  # ============================================================================
  # PERFORMANCE NOTIFICATIONS
  # ============================================================================
  notify-performance:
    name: 📢 Performance Notifications
    runs-on: ubuntu-latest
    needs: [api-performance, database-performance, profiling, regression-detection]
    if: always()
    
    steps:
      - name: 📊 Performance Summary
        run: |
          echo "## 📊 Performance Test Results"
          echo "- API Performance: ${{ needs.api-performance.result }}"
          echo "- Database Performance: ${{ needs.database-performance.result }}"
          echo "- Profiling: ${{ needs.profiling.result }}"
          echo "- Regression Detection: ${{ needs.regression-detection.result }}"

      - name: 🚨 Alert on Performance Issues
        if: |
          needs.api-performance.result == 'failure' ||
          needs.database-performance.result == 'failure' ||
          needs.regression-detection.result == 'failure'
        run: |
          echo "🚨 Performance issues detected!"
          # Add notifications here (Slack, Discord, Email, etc.)
          # Example:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Examify API performance issues detected!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: ✅ Success Notification
        if: |
          needs.api-performance.result == 'success' &&
          needs.database-performance.result == 'success' &&
          needs.regression-detection.result == 'success'
        run: |
          echo "✅ All performance tests passed!"
          # Add success notifications here
