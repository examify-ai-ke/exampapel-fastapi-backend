name: 🔍 Pull Request Validation (Alternative)

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

# Comprehensive permissions to avoid integration issues
permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write
  issues: write

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.6.1"

jobs:
  # ============================================================================
  # PR METADATA & VALIDATION (Custom Implementation)
  # ============================================================================
  pr-validation:
    name: 📋 PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Validate PR Title (Custom)
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.pull_request.title;
            console.log(`Validating PR title: "${title}"`);
            
            // Define allowed types
            const allowedTypes = [
              'feat', 'fix', 'docs', 'style', 'refactor', 
              'perf', 'test', 'build', 'ci', 'chore', 'revert'
            ];
            
            // Check if title follows conventional commit format
            const conventionalCommitRegex = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+/;
            
            if (!conventionalCommitRegex.test(title)) {
              const message = `❌ PR title "${title}" doesn't follow conventional commit format.
              
              Expected format: type(scope): description
              
              Allowed types: ${allowedTypes.join(', ')}
              
              Examples:
              - feat: add user authentication
              - fix: resolve database connection issue
              - docs: update API documentation
              - refactor(auth): improve token validation
              
              Please update your PR title to follow this format.`;
              
              core.setFailed(message);
              return;
            }
            
            // Extract type from title
            const typeMatch = title.match(/^([a-z]+)/);
            const type = typeMatch ? typeMatch[1] : '';
            
            if (!allowedTypes.includes(type)) {
              core.setFailed(`❌ PR type "${type}" is not allowed. Use one of: ${allowedTypes.join(', ')}`);
              return;
            }
            
            // Check if subject starts with uppercase (should be lowercase)
            const subjectMatch = title.match(/^[a-z]+(\(.+\))?: (.+)/);
            if (subjectMatch) {
              const subject = subjectMatch[2];
              if (subject && subject[0] === subject[0].toUpperCase() && /[A-Z]/.test(subject[0])) {
                core.setFailed(`❌ PR subject "${subject}" should not start with an uppercase letter. Use lowercase instead.`);
                return;
              }
            }
            
            console.log('✅ PR title validation passed!');

      - name: 📊 PR Size Check
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;
            
            console.log(`PR Size: +${additions} -${deletions} (${changes} total changes)`);
            
            let sizeLabel = '';
            let sizeEmoji = '';
            let sizeMessage = '';
            
            if (changes <= 50) {
              sizeLabel = 'size/XS';
              sizeEmoji = '🟢';
              sizeMessage = 'Extra Small PR - Quick to review!';
            } else if (changes <= 200) {
              sizeLabel = 'size/S';
              sizeEmoji = '🟢';
              sizeMessage = 'Small PR - Easy to review';
            } else if (changes <= 500) {
              sizeLabel = 'size/M';
              sizeEmoji = '🟡';
              sizeMessage = 'Medium PR - Moderate review time';
            } else if (changes <= 1000) {
              sizeLabel = 'size/L';
              sizeEmoji = '🟠';
              sizeMessage = 'Large PR - Consider breaking into smaller PRs';
            } else {
              sizeLabel = 'size/XL';
              sizeEmoji = '🔴';
              sizeMessage = 'Extra Large PR - Strongly consider breaking into smaller PRs';
            }
            
            // Add size label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [sizeLabel]
              });
            } catch (error) {
              console.log('Could not add label (this is normal for external contributors)');
            }
            
            // Add comment about PR size
            const comment = `## ${sizeEmoji} PR Size Analysis
            
            **${sizeMessage}**
            
            - **Additions:** +${additions} lines
            - **Deletions:** -${deletions} lines
            - **Total Changes:** ${changes} lines
            - **Size Category:** ${sizeLabel}
            
            ${changes > 500 ? '⚠️ **Recommendation:** Consider breaking this PR into smaller, focused changes for easier review and reduced risk.' : ''}
            `;
            
            // Only add comment for larger PRs to avoid spam
            if (changes > 200) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              } catch (error) {
                console.log('Could not add comment (this is normal for external contributors)');
              }
            }
            
            // Fail if PR is too large
            if (changes > 2000) {
              core.setFailed(`PR is too large (${changes} changes). Please break it into smaller PRs for better reviewability.`);
            }

  # ============================================================================
  # FAST QUALITY CHECKS
  # ============================================================================
  quick-checks:
    name: ⚡ Quick Quality Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: 🔧 Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: backend/app/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: 📚 Install Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        working-directory: ./backend/app
        run: poetry install --no-interaction --no-root --with dev

      - name: 🎨 Check Code Formatting
        working-directory: ./backend/app
        run: |
          echo "::group::Black Formatting Check"
          poetry run black --check --diff . || {
            echo "::error::Code is not properly formatted. Run 'black .' to fix."
            echo ""
            echo "To fix formatting issues:"
            echo "1. Run: cd backend/app && poetry run black ."
            echo "2. Commit the changes"
            echo "3. Push to update this PR"
            exit 1
          }
          echo "::endgroup::"

      - name: 🔍 Lint Code
        working-directory: ./backend/app
        run: |
          echo "::group::Ruff Linting"
          poetry run ruff check . --output-format=github || {
            echo "::error::Linting issues found. Please fix the issues above."
            echo ""
            echo "To fix linting issues:"
            echo "1. Run: cd backend/app && poetry run ruff check . --fix"
            echo "2. Review and commit the changes"
            echo "3. Push to update this PR"
            exit 1
          }
          echo "::endgroup::"

      - name: 🏷️ Type Check
        working-directory: ./backend/app
        run: |
          echo "::group::MyPy Type Checking"
          poetry run mypy . || {
            echo "::error::Type checking failed. Please fix type issues above."
            echo ""
            echo "Common fixes:"
            echo "1. Add type hints to function parameters and return values"
            echo "2. Import proper types from typing module"
            echo "3. Use Optional[Type] for nullable values"
            exit 1
          }
          echo "::endgroup::"

  # ============================================================================
  # SECURITY SCAN (Lightweight)
  # ============================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend/app'
          format: 'table'
          exit-code: '0'  # Don't fail on vulnerabilities in PR validation
          severity: 'CRITICAL,HIGH'

      - name: 🛡️ Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
          generateSarif: "0"  # Don't generate SARIF for PR validation

  # ============================================================================
  # PR SUMMARY
  # ============================================================================
  pr-summary:
    name: 📝 PR Summary
    runs-on: ubuntu-latest
    needs: [pr-validation, quick-checks, security-scan]
    if: always() && github.event.pull_request.draft == false
    
    permissions:
      pull-requests: write
    
    steps:
      - name: 📊 Generate PR Summary
        uses: actions/github-script@v6
        with:
          script: |
            const results = {
              'PR Validation': '${{ needs.pr-validation.result }}',
              'Quick Checks': '${{ needs.quick-checks.result }}',
              'Security Scan': '${{ needs.security-scan.result }}'
            };
            
            let summary = '## 🔍 PR Validation Summary\n\n';
            let allPassed = true;
            let hasFailures = false;
            
            for (const [check, result] of Object.entries(results)) {
              let emoji, status;
              if (result === 'success') {
                emoji = '✅';
                status = 'Passed';
              } else if (result === 'failure') {
                emoji = '❌';
                status = 'Failed';
                allPassed = false;
                hasFailures = true;
              } else if (result === 'cancelled') {
                emoji = '⏸️';
                status = 'Cancelled';
                allPassed = false;
              } else {
                emoji = '⏸️';
                status = 'Skipped';
                allPassed = false;
              }
              summary += `${emoji} **${check}**: ${status}\n`;
            }
            
            summary += '\n';
            
            if (allPassed) {
              summary += '🎉 **All checks passed!** This PR is ready for review.\n\n';
              summary += '### ✅ What was validated:\n';
              summary += '- PR title follows conventional commit format\n';
              summary += '- Code formatting is correct (Black)\n';
              summary += '- Linting passes (Ruff)\n';
              summary += '- Type checking passes (MyPy)\n';
              summary += '- Security scans completed\n';
              summary += '- PR size is reasonable\n';
            } else if (hasFailures) {
              summary += '⚠️ **Some checks failed.** Please review and fix the issues above.\n\n';
              summary += '### 🔧 How to fix common issues:\n';
              summary += '- **Formatting**: Run `cd backend/app && poetry run black .`\n';
              summary += '- **Linting**: Run `cd backend/app && poetry run ruff check . --fix`\n';
              summary += '- **Type checking**: Add missing type hints\n';
              summary += '- **PR title**: Use format like `feat: add new feature`\n';
            } else {
              summary += '⏸️ **Some checks were skipped or cancelled.** This may be due to workflow configuration.\n';
            }
            
            // Add summary as PR comment
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } catch (error) {
              console.log('Could not add PR comment:', error.message);
            }
