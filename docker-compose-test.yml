version: '3.8'

services:
  examify_api:
    container_name: examify_api_test
    build: 
      context: ./backend      
      args:
        INSTALL_DEV: "true"
    restart: always
    command: "sh -c 'alembic upgrade head && uvicorn app.main:app --reload --workers 3 --host 0.0.0.0 --port 8000'"
    volumes:
      - ./backend/app:/code
    expose:
      - 8000
    env_file: ".env"
    environment:                
      MODE: "testing"      
    depends_on:
      - examify_database_test
    links:
      - examify_reverse_proxy_test:storage.localhost

  examify_database_test:
    image: bitnami/postgresql
    restart: always
    container_name: examify_database_test
    env_file: ".env"
    user: root
    volumes:
      - examify_test_db_data:/bitnami/postgresql
      - ./create-dbs.sql:/docker-entrypoint-initdb.d/create-dbs.sql
    ports:
      - 5454:5432 # Remove this on production
    expose:
      - 5432
    environment:
      - POSTGRESQL_USERNAME=${DATABASE_USER}
      - POSTGRESQL_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRESQL_DATABASE=${DATABASE_NAME}

  examify_redis_test:
    image: redis:alpine
    container_name: examify_redis_test    
    restart: always
    expose:
      - 6379
    env_file: .env

  examify_celery_worker_test:
    container_name: examify_celery_worker_test
    restart: always
    # platform: linux/arm64/v8
    build: ./backend
    command: "watchfiles 'celery -A app.core.celery worker -l info' "
    volumes:
      - ./backend/app:/code
      # - "${EB_LOG_BASE_DIR}/php-app:/var/log/celery"
    depends_on:
      - examify_database_test
      - examify_redis_test
    env_file: .env
  
  examify_celery_beat_test:  #Good for crontab and schedule tasks
    container_name: examify_celery_beat_test
    restart: always
    # platform: linux/arm64/v8
    build:
      context: ./backend
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    command: celery -A app.core.celery beat -l info -S celery_sqlalchemy_scheduler.schedulers:DatabaseScheduler -l info
    volumes:
      - ./backend/app:/code
      # - "${EB_LOG_BASE_DIR}/php-app:/var/log/celery-beat"
    depends_on:
      - examify_database_test
      - examify_redis_test
    env_file: .env

  examify_minio_test:
    image: minio/minio:latest
    restart: always
    container_name: examify_minio_test
    volumes:
      - ./minio/data:/data
    expose:
      - 9000
      - 9091
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://stash.localhost
    command: "server /data --console-address ':9090'"    

  examify_reverse_proxy_test:
    container_name: examify_reverse_proxy_test
    image: caddy:alpine
    restart: always
    ports:
      - 80:80      
      - 443:443
    environment:
      - EXT_ENDPOINT1=${EXT_ENDPOINT1}
      - LOCAL_1=${LOCAL_1}
      - LOCAL_2=${LOCAL_2}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./static:/code/static
      - examify_test_caddy_data:/data
      - examify_test_caddy_config:/config

volumes:
  examify_test_db_data:
  examify_test_caddy_data:
  examify_test_caddy_config: