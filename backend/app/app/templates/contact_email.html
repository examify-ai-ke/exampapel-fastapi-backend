<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Form Submission</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4285f4;
        }
        .header h2 {
            margin: 0;
            color: #4285f4;
        }
        .field-group {
            margin-bottom: 15px;
        }
        .field-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
        .field-value {
            padding: 10px;
            background-color: #fff;
            border-left: 3px solid #4285f4;
            margin: 5px 0;
        }
        .message-content {
            white-space: pre-wrap;
            font-family: inherit;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        .topic-badge {
            display: inline-block;
            background-color: #4285f4;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Contact Form Submission</h2>
            <span class="topic-badge">{{ topic }}</span>
        </div>

        <div class="field-group">
            <div class="field-label">From:</div>
            <div class="field-value">
                <strong>{{ full_name }}</strong><br>
                <a href="mailto:{{ email }}">{{ email }}</a>
            </div>
        </div>

        <div class="field-group">
            <div class="field-label">Institution / Organization:</div>
            <div class="field-value">{{ institution }}</div>
        </div>

        <div class="field-group">
            <div class="field-label">Message:</div>
            <div class="field-value">
                <div class="message-content">{{ message }}</div>
            </div>
        </div>

        <div class="footer">
            <p>This message was sent through the {{ company_name }} contact form.</p>
            <p>Click <a href="mailto:{{ email }}">here to reply</a> directly to {{ full_name }}.</p>
        </div>
    </div>
</body>
</html>
